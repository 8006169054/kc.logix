<!DOCTYPE html>
<!-- Default Layout Import-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/default/layout}" layout:fragment="Content">

<!-- 팝업 사용방법 -->
<th:block th:replace="html/apps/basic/popup/port-popup :: Popup"></th:block>

<!-- Page Specific JS File -->
<script th:inline="javascript">
var portTableColNames = [[#{basic.port.table.cols}]];
</script>
<script src="/templates/html/apps/basic/port.js"></script>
<!-- Main Content -->
<div class="main-content">
	<section class="section">
		<div class="section-header">
			<h1 th:text="#{common.maincontent.basic.port.title}"></h1>
			<div class="section-header-breadcrumb">
				<div class="breadcrumb-item active">
					<a href="/" th:text="#{common.sidebar.hmoe.name}"></a>
				</div>
				<div class="breadcrumb-item" th:text="#{common.sidebar.basic.name}"></div>
				<div class="breadcrumb-item" th:text="#{common.sidebar.basic.port.name}"></div>
			</div>
		</div>
		<div class="section-body">
			<div class="row">
				<div class="col-100">
					<div class="card">
						<div class="card-header">
						<div class="form-group row">
							<div class="col-md-100 text-right">
							<input type="file" id="customFile" name="customFile" style="visibility:hidden; width: 10px;" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
							<button class="btn btn-info" onclick="fileOpen()" th:text="#{common.button.label.upload}"></button>
							<button class="btn btn-success" onclick="save()" th:text="#{common.button.label.save}"></button>
							</div>
							</div>
						</div>
						<div class="card-body p-0">
							<div class="table-responsive" style="overflow: hidden;">
								<table id="port-table"></table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</div>

</html>
